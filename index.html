<script>

const questions = [

{
question:"The baby cried loudly.",
word:"baby",
options:["Noun","Verb","Adjective","Adverb"],
answer:"Noun"
},

{
question:"She always arrives early.",
word:"always",
options:["Adverb","Adjective","Verb","Noun"],
answer:"Adverb"
},

{
question:"He opened the heavy door.",
word:"heavy",
options:["Adjective","Verb","Pronoun","Preposition"],
answer:"Adjective"
},

{
question:"We went to the park.",
word:"to",
options:["Preposition","Conjunction","Verb","Noun"],
answer:"Preposition"
},

{
question:"I or my brother will help you.",
word:"or",
options:["Conjunction","Interjection","Adverb","Verb"],
answer:"Conjunction"
},

{
question:"Hurray! We won the match.",
word:"Hurray",
options:["Interjection","Noun","Verb","Adjective"],
answer:"Interjection"
},

{
question:"This pen is mine.",
word:"mine",
options:["Pronoun","Noun","Verb","Article"],
answer:"Pronoun"
},

{
question:"The teacher explained the lesson clearly.",
word:"clearly",
options:["Adverb","Adjective","Verb","Noun"],
answer:"Adverb"
},

{
question:"An apple fell from the tree.",
word:"apple",
options:["Noun","Verb","Preposition","Adverb"],
answer:"Noun"
},

{
question:"She writes beautiful stories.",
word:"writes",
options:["Verb","Adjective","Noun","Pronoun"],
answer:"Verb"
},

{
question:"The little boy smiled happily.",
word:"little",
options:["Adjective","Verb","Adverb","Conjunction"],
answer:"Adjective"
},

{
question:"We waited until the rain stopped.",
word:"until",
options:["Conjunction","Preposition","Noun","Verb"],
answer:"Conjunction"
},

{
question:"He jumped over the fence.",
word:"over",
options:["Preposition","Adverb","Noun","Verb"],
answer:"Preposition"
},

{
question:"Those flowers smell wonderful.",
word:"Those",
options:["Determiner","Verb","Noun","Adverb"],
answer:"Determiner"
},

{
question:"The birds flew high.",
word:"high",
options:["Adverb","Noun","Verb","Pronoun"],
answer:"Adverb"
},

{
question:"Every student completed the homework.",
word:"Every",
options:["Determiner","Noun","Verb","Interjection"],
answer:"Determiner"
},

{
question:"She is reading an interesting novel.",
word:"interesting",
options:["Adjective","Verb","Adverb","Preposition"],
answer:"Adjective"
},

{
question:"Please speak softly.",
word:"softly",
options:["Adverb","Noun","Verb","Adjective"],
answer:"Adverb"
},

{
question:"Neither Rahul nor Aman was absent.",
word:"Neither",
options:["Determiner","Verb","Noun","Adverb"],
answer:"Determiner"
},

{
question:"The horse ran across the field.",
word:"across",
options:["Preposition","Conjunction","Verb","Pronoun"],
answer:"Preposition"
}

];

// Shuffle questions
questions.sort(() => Math.random() - 0.5);

const quiz = document.getElementById("quiz");

questions.forEach((q,index){

    // Shuffle options
    const options = [...q.options].sort(() => Math.random() - 0.5);

    let html = `
    <div class="question">
        <h3>Q${index+1}. Identify the part of speech of <span style="color:#2563eb">"${q.word}"</span>.</h3>
        <p>${q.question}</p>
    `;

    options.forEach(option=>{
        html += `
        <label>
            <input type="radio" name="q${index}" value="${option}">
            ${option}
        </label>
        `;
    });

    html += `<div id="result${index}"></div></div>`;

    quiz.innerHTML += html;

});

function checkAnswers(){

    let marks = 0;

    questions.forEach((q,index)=>{

        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const result = document.getElementById(`result${index}`);

        if(selected){

            if(selected.value === q.answer){

                marks++;
                result.innerHTML = '<p class="correct">✔ Correct</p>';

            }else{

                result.innerHTML = `<p class="wrong">✘ Correct Answer: ${q.answer}</p>`;

            }

        }else{

            result.innerHTML = `<p class="wrong">No Answer. Correct Answer: ${q.answer}</p>`;

        }

    });

    document.getElementById("score").innerHTML = `Your Score: ${marks} / ${questions.length}`;

    window.scrollTo({
        top: document.body.scrollHeight,
        behavior: "smooth"
    });

}

</script>
