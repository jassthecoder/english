<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Parts of Speech Test</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}body{margin:0;background:#f4f6fb;padding:30px}.container{max-width:900px;margin:auto;background:#fff;padding:30px;border-radius:12px;box-shadow:0 5px 20px rgba(0,0,0,.1)}h1,#timer,#score{text-align:center}#timer{font-size:22px;color:#d32f2f;font-weight:bold}.question{margin:20px 0;padding:20px;border:1px solid #ddd;border-radius:10px}label{display:block;margin:8px 0}button{width:100%;padding:14px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:18px}.correct{color:green;font-weight:bold}.wrong{color:#c00;font-weight:bold}.explanation{background:#eef6ff;padding:10px;border-left:4px solid #2563eb;margin-top:8px}.footer{text-align:center;margin-top:30px;padding-top:20px;border-top:1px solid #ddd}
</style></head><body><div class="container"><h1>Parts of Speech Test</h1><div id="timer">Time Left: 10:00</div><div id="quiz"></div><button id="submitBtn" onclick="checkAnswers()">Submit Test</button><div id="score"></div></div>
<div class="footer">Created by <strong>@englishwithjaspreett</strong><br><a href="https://youtube.com/@englishwithjaspreett">YouTube</a> | <a href="https://instagram.com/englishwithjaspreett">Instagram</a></div>
<script>
const questions=[
{question:"The baby cried loudly.",word:"baby",options:["Noun","Verb","Adjective","Adverb"],answer:"Noun",exp:"'Baby' is the name of a person."},
{question:"She always arrives early.",word:"always",options:["Adverb","Adjective","Verb","Noun"],answer:"Adverb",exp:"'Always' tells how often."},
{question:"He opened the heavy door.",word:"heavy",options:["Adjective","Verb","Pronoun","Preposition"],answer:"Adjective",exp:"'Heavy' describes 'door'."},
{question:"We went to the park.",word:"to",options:["Preposition","Conjunction","Verb","Noun"],answer:"Preposition",exp:"'To' shows relationship."},
{question:"I or my brother will help you.",word:"or",options:["Conjunction","Interjection","Adverb","Verb"],answer:"Conjunction",exp:"'Or' joins choices."},
{question:"Hurray! We won the match.",word:"Hurray",options:["Interjection","Noun","Verb","Adjective"],answer:"Interjection",exp:"Expresses emotion."},
{question:"This pen is mine.",word:"mine",options:["Pronoun","Noun","Verb","Article"],answer:"Pronoun",exp:"Replaces a noun."},
{question:"The teacher explained the lesson clearly.",word:"clearly",options:["Adverb","Adjective","Verb","Noun"],answer:"Adverb",exp:"Describes the verb 'explained'."},
{question:"An apple fell from the tree.",word:"apple",options:["Noun","Verb","Preposition","Adverb"],answer:"Noun",exp:"Names a thing."},
{question:"She writes beautiful stories.",word:"writes",options:["Verb","Adjective","Noun","Pronoun"],answer:"Verb",exp:"Shows an action."},
{question:"The little boy smiled happily.",word:"little",options:["Adjective","Verb","Adverb","Conjunction"],answer:"Adjective",exp:"Describes 'boy'."},
{question:"We waited until the rain stopped.",word:"until",options:["Conjunction","Preposition","Noun","Verb"],answer:"Conjunction",exp:"Joins clauses."},
{question:"He jumped over the fence.",word:"over",options:["Preposition","Adverb","Noun","Verb"],answer:"Preposition",exp:"Shows position."},
{question:"Those flowers smell wonderful.",word:"Those",options:["Determiner","Verb","Noun","Adverb"],answer:"Determiner",exp:"Points to specific nouns."},
{question:"The birds flew high.",word:"high",options:["Adverb","Noun","Verb","Pronoun"],answer:"Adverb",exp:"Describes how they flew."},
{question:"Every student completed the homework.",word:"Every",options:["Determiner","Noun","Verb","Interjection"],answer:"Determiner",exp:"Limits the noun."},
{question:"She is reading an interesting novel.",word:"interesting",options:["Adjective","Verb","Adverb","Preposition"],answer:"Adjective",exp:"Describes 'novel'."},
{question:"Please speak softly.",word:"softly",options:["Adverb","Noun","Verb","Adjective"],answer:"Adverb",exp:"Describes how to speak."},
{question:"Neither Rahul nor Aman was absent.",word:"Neither",options:["Determiner","Verb","Noun","Adverb"],answer:"Determiner",exp:"Determines the noun."},
{question:"The horse ran across the field.",word:"across",options:["Preposition","Conjunction","Verb","Pronoun"],answer:"Preposition",exp:"Shows relationship."}
];
questions.sort(()=>Math.random()-0.5);
const quiz=document.getElementById("quiz");
questions.forEach((q,i)=>{const opts=[...q.options].sort(()=>Math.random()-0.5);let h=`<div class="question"><h3>Q${i+1}. Identify the part of speech of "<span style='color:#2563eb'>${q.word}</span>".</h3><p>${q.question}</p>`;opts.forEach(o=>h+=`<label><input type="radio" name="q${i}" value="${o}"> ${o}</label>`);h+=`<div id="r${i}"></div></div>`;quiz.innerHTML+=h;});
let t=600,done=false;const int=setInterval(()=>{if(done)return;t--;timer.textContent="Time Left: "+String(Math.floor(t/60)).padStart(2,"0")+":"+String(t%60).padStart(2,"0");if(t<=0)checkAnswers();},1000);
function checkAnswers(){if(done)return;done=true;clearInterval(int);document.querySelectorAll("input").forEach(x=>x.disabled=true);submitBtn.disabled=true;let m=0;questions.forEach((q,i)=>{const s=document.querySelector(`input[name="q${i}"]:checked`);const r=document.getElementById("r"+i);if(s&&s.value===q.answer){m++;r.innerHTML=`<div class='correct'>✔ Correct</div><div class='explanation'>${q.exp}</div>`;}else{r.innerHTML=`<div class='wrong'>✘ Correct Answer: ${q.answer}</div><div class='explanation'>${q.exp}</div>`;}});score.textContent=`Your Score: ${m}/${questions.length} (${Math.round(m/questions.length*100)}%)`;}
</script></body></html>
