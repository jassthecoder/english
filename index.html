<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parts of Speech Test</title>
<style>
*{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{margin:0;background:#f4f6fb;padding:30px}
.container{max-width:900px;margin:auto;background:#fff;padding:30px;border-radius:12px;box-shadow:0 5px 20px rgba(0,0,0,.1)}
h1{text-align:center}
#timer{text-align:center;font-size:22px;font-weight:bold;color:#d32f2f;margin:15px 0}
.question{margin:25px 0;padding:20px;border:1px solid #ddd;border-radius:10px}
label{display:block;margin:10px 0;cursor:pointer}
button{width:100%;padding:15px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:18px;cursor:pointer}
.correct{color:green;font-weight:bold}
.wrong{color:red;font-weight:bold}
.explanation{background:#eef6ff;border-left:4px solid #2563eb;padding:10px;margin-top:10px;border-radius:6px}
#score{text-align:center;font-size:24px;margin-top:30px;font-weight:bold}
.footer{text-align:center;margin-top:40px;border-top:1px solid #ddd;padding-top:20px;color:#666;line-height:1.7}
.footer a{text-decoration:none;color:#2563eb;font-weight:bold}
</style>
</head>
<body>
<div class="container">
<h1>Parts of Speech Test</h1>
<div id="timer">Time Left: 10:00</div>
<div id="quiz"></div>
<button id="submitBtn" onclick="checkAnswers()">Submit Test</button>
<div id="score"></div>
</div>

<div class="footer">
Created by <strong>@englishwithjaspreett</strong><br>
<a href="https://youtube.com/@englishwithjaspreett" target="_blank">YouTube</a> |
<a href="https://instagram.com/englishwithjaspreett" target="_blank">Instagram</a>
</div>

<script>
const questions=[
{question:"The baby cried loudly.",word:"baby",options:["Noun","Verb","Adjective","Adverb"],answer:"Noun",exp:"'Baby' names a person, so it is a noun."},
{question:"She always arrives early.",word:"always",options:["Adverb","Adjective","Verb","Noun"],answer:"Adverb",exp:"'Always' tells how often, so it is an adverb."},
{question:"He opened the heavy door.",word:"heavy",options:["Adjective","Verb","Pronoun","Preposition"],answer:"Adjective",exp:"'Heavy' describes the noun 'door', so it is an adjective."},
{question:"We went to the park.",word:"to",options:["Preposition","Conjunction","Verb","Noun"],answer:"Preposition",exp:"'To' shows relationship, so it is a preposition."},
{question:"Hurray! We won the match.",word:"Hurray",options:["Interjection","Noun","Verb","Adjective"],answer:"Interjection",exp:"'Hurray!' expresses emotion, so it is an interjection."}
];
questions.sort(()=>Math.random()-0.5);
const quiz=document.getElementById("quiz");
questions.forEach((q,i)=>{
 const opts=[...q.options].sort(()=>Math.random()-0.5);
 let h=`<div class="question"><h3>Q${i+1}. Identify the part of speech of "<span style="color:#2563eb">${q.word}</span>".</h3><p>${q.question}</p>`;
 opts.forEach(o=>h+=`<label><input type="radio" name="q${i}" value="${o}"> ${o}</label>`);
 h+=`<div id="result${i}"></div></div>`;
 quiz.innerHTML+=h;
});
let time=600;
let submitted=false;
const timer=setInterval(()=>{
 if(submitted) return;
 time--;
 const m=Math.floor(time/60).toString().padStart(2,"0");
 const s=(time%60).toString().padStart(2,"0");
 document.getElementById("timer").textContent="Time Left: "+m+":"+s;
 if(time<=0){clearInterval(timer);checkAnswers();}
},1000);

function checkAnswers(){
 if(submitted) return;
 submitted=true;
 clearInterval(timer);
 let marks=0;
 document.querySelectorAll('input[type=radio]').forEach(r=>r.disabled=true);
 document.getElementById("submitBtn").disabled=true;
 questions.forEach((q,i)=>{
   const sel=document.querySelector(`input[name="q${i}"]:checked`);
   const res=document.getElementById("result"+i);
   if(sel&&sel.value===q.answer){
      marks++;
      res.innerHTML=`<div class="correct">✔ Correct</div><div class="explanation">${q.exp}</div>`;
   }else{
      res.innerHTML=`<div class="wrong">✘ Correct Answer: ${q.answer}</div><div class="explanation">${q.exp}</div>`;
   }
 });
 document.getElementById("score").textContent=`Your Score: ${marks}/${questions.length} (${Math.round(marks/questions.length*100)}%)`;
}
</script>
</body>
</html>
